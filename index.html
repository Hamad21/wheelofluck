<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عجلة الحظ المدرسية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:   #fdf6e3;
    --sky:     #d0eaf8;
    --mint:    #d4f0e0;
    --peach:   #fde8d8;
    --lavender:#ecdff7;
    --yellow:  #fff3c4;
    --coral:   #f7c5c5;
    --text:    #3a2e1f;
    --brown:   #7a5c3a;
    --line:    #b8cfe8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Notebook lines */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: repeating-linear-gradient(
      transparent, transparent 31px,
      var(--line) 31px, var(--line) 32px
    );
    opacity: .4;
  }

  /* Left red margin */
  body::after {
    content: '';
    position: fixed; top: 0; bottom: 0; left: 72px;
    width: 2px; background: #f5aaaa66; z-index: 0; pointer-events: none;
  }

  #doodle-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }

  .wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 26px;
    padding: 30px 16px 50px;
  }

  /* Title */
  .title-wrap {
    display: flex; align-items: center; gap: 12px;
    background: #fff;
    border: 3px solid #f0c060;
    border-radius: 20px;
    padding: 12px 28px;
    box-shadow: 4px 4px 0 #f0c06088;
  }
  .title-wrap::before { content: '✏️'; font-size: 1.5rem; }
  .title-wrap::after  { content: '✏️'; font-size: 1.5rem; transform: scaleX(-1); display:inline-block; }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: #5a3e1b;
    letter-spacing: 1px; text-align: center;
  }

  /* Wheel */
  .wheel-outer {
    position: relative;
    width: min(400px, 92vw);
    height: min(400px, 92vw);
    display: flex; align-items: center; justify-content: center;
  }
  .wheel-outer::after {
    content: '';
    position: absolute; inset: -6px; border-radius: 50%;
    box-shadow: 6px 6px 0 #e8d5b0, 0 0 0 3px #d4b896;
    z-index: 0; pointer-events: none;
  }
  canvas#wheel {
    border-radius: 50%; position: relative; z-index: 1;
    width: 100%; height: 100%;
    box-shadow: 3px 3px 18px #c9a97055;
  }

  /* Pointer */
  .pointer-wrap {
    position: absolute; top: -22px; left: 50%;
    transform: translateX(-50%); z-index: 3;
  }
  .pointer-triangle {
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 30px solid #e05050;
    filter: drop-shadow(0 2px 4px #e0505066);
  }

  /* Center btn */
  #spin-btn {
    position: absolute; z-index: 4;
    width: 68px; height: 68px; border-radius: 50%;
    border: 3px solid #fff; cursor: pointer;
    background: radial-gradient(circle at 38% 36%, #ffe066, #f0a020);
    box-shadow: 2px 3px 0 #c07010, 0 0 14px #f0c04066;
    font-family: 'Fredoka One', cursive;
    font-size: .85rem; color: #5a2e00;
    transition: transform .15s, box-shadow .15s;
  }
  #spin-btn:hover:not(:disabled) {
    transform: scale(1.08) translateY(-1px);
    box-shadow: 3px 4px 0 #c07010, 0 0 22px #f0c04099;
  }
  #spin-btn:disabled { opacity:.55; cursor:not-allowed; }

  /* Big spin btn */
  .spin-outer-btn {
    background: linear-gradient(135deg, #7ec8e3, #4aa8d0);
    border: 3px solid #fff; border-radius: 18px; color: #fff;
    padding: 13px 46px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; cursor: pointer;
    box-shadow: 3px 4px 0 #2e88b0;
    transition: transform .15s, box-shadow .15s;
  }
  .spin-outer-btn:hover:not(:disabled) {
    transform: translateY(-3px); box-shadow: 3px 6px 0 #2e88b0;
  }
  .spin-outer-btn:disabled { opacity:.5; cursor:not-allowed; }

  /* Modal */
  #result-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: #0000004d; backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  #result-modal.show { display: flex; }
  .result-box {
    background: #fff; border: 4px solid #f0c060; border-radius: 28px;
    padding: 40px 48px; text-align: center;
    max-width: 380px; width: 90%;
    box-shadow: 6px 6px 0 #e8c070, 0 20px 60px #0002;
    animation: popIn .45s cubic-bezier(.34,1.56,.64,1);
    direction: rtl; position: relative; overflow: hidden;
  }
  .result-box::before {
    content: '⭐ 📚 ✏️ 📐 🎒';
    position: absolute; top: 8px; left: 0; right: 0;
    font-size: 1rem; letter-spacing: 4px; opacity: .2; text-align: center;
  }
  @keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .result-box .result-emoji { font-size: 3.5rem; margin-bottom: 8px; }
  .result-box h3 {
    font-family: 'Fredoka One', cursive; font-size: 1rem;
    color: #aaa; margin-bottom: 12px; direction: ltr; letter-spacing: 2px;
  }
  .result-box .winner {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem,5vw,2rem);
    color: #3a7bd5; margin-bottom: 26px; line-height: 1.3;
  }
  .result-close {
    background: linear-gradient(135deg, #f7a34a, #e07020);
    border: 3px solid #fff; border-radius: 14px; color: #fff;
    padding: 11px 30px; font-family: 'Fredoka One', cursive;
    font-size: 1rem; cursor: pointer; box-shadow: 2px 3px 0 #b05010;
    transition: transform .15s;
  }
  .result-close:hover { transform: scale(1.05) translateY(-1px); }

  #confetti { position: fixed; inset: 0; z-index: 199; pointer-events: none; }
</style>
</head>
<body>

<div id="doodle-layer">
  <canvas id="doodle-canvas"></canvas>
</div>
<canvas id="confetti"></canvas>

<div class="wrap">
  <div class="title-wrap">
    <h1>عجلة الحظ المدرسية</h1>
  </div>

  <div class="wheel-outer">
    <canvas id="wheel" width="400" height="400"></canvas>
    <div class="pointer-wrap"><div class="pointer-triangle"></div></div>
    <button id="spin-btn">دوّر</button>
  </div>

  <button class="spin-outer-btn" id="spin-outer">🎲 دوّر العجلة</button>
</div>

<div id="result-modal">
  <div class="result-box">
    <div class="result-emoji">🌟</div>
    <h3>THE WINNER IS</h3>
    <div class="winner" id="winner-text"></div>
    <button class="result-close" id="btn-close-result">دوّر مجدداً 🎉</button>
  </div>
</div>

<script>
/* ══ DOODLE BACKGROUND ══════════════════════════════ */
const doodle = document.getElementById('doodle-canvas');
const dc = doodle.getContext('2d');

function seededRand(seed){
  let s=seed;
  return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; };
}

function resizeDoodle(){
  doodle.width=window.innerWidth;
  doodle.height=window.innerHeight;
  drawDoodles();
}

function drawDoodles(){
  dc.clearRect(0,0,doodle.width,doodle.height);
  const W=doodle.width, H=doodle.height;
  const rng=seededRand(77);
  const r=(a,b)=>a+rng()*(b-a);

  const positions=[];
  for(let i=0;i<24;i++) positions.push({x:r(20,W-20), y:r(20,H-20), rot:r(-50,50)*Math.PI/180});

  const palette=['#f28b82','#fbbc04','#34a853','#4285f4','#a142f4','#ff6d00','#2ecc71','#e91e63'];
  const drawFns=[drawPencil,drawRuler,drawStar4,drawBook,drawApple,drawEraser,drawSparkle,drawPencil];

  positions.forEach((p,i)=>{
    dc.save();
    dc.translate(p.x, p.y);
    dc.rotate(p.rot);
    dc.globalAlpha = .1 + (i%4)*.03;
    drawFns[i%drawFns.length](palette[i%palette.length]);
    dc.restore();
  });
}

function drawPencil(col){
  dc.fillStyle=col;
  dc.beginPath(); dc.roundRect(-6,-28,12,44,3); dc.fill();
  dc.fillStyle='#f5deb3';
  dc.beginPath(); dc.moveTo(-6,16); dc.lineTo(6,16); dc.lineTo(0,30); dc.closePath(); dc.fill();
  dc.fillStyle='#444';
  dc.beginPath(); dc.moveTo(-2,24); dc.lineTo(2,24); dc.lineTo(0,30); dc.closePath(); dc.fill();
  dc.fillStyle='#ffb3ba';
  dc.beginPath(); dc.roundRect(-6,-32,12,7,3); dc.fill();
  dc.fillStyle='#ccc'; dc.fillRect(-6,-26,12,4);
  dc.strokeStyle='rgba(0,0,0,.12)'; dc.lineWidth=1;
  dc.beginPath(); dc.moveTo(-6,-22); dc.lineTo(6,-22); dc.stroke();
}

function drawRuler(col){
  dc.fillStyle=col;
  dc.beginPath(); dc.roundRect(-8,-36,16,72,4); dc.fill();
  dc.strokeStyle='rgba(255,255,255,.5)'; dc.lineWidth=1;
  for(let y=-30;y<=30;y+=6){
    const len=y%12===0?7:4;
    dc.beginPath(); dc.moveTo(-8,y); dc.lineTo(-8+len,y); dc.stroke();
    dc.beginPath(); dc.moveTo(8,y); dc.lineTo(8-len,y); dc.stroke();
  }
}

function drawStar4(col){
  dc.fillStyle=col;
  dc.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, rv=i%2===0?18:8;
    i===0?dc.moveTo(Math.cos(a)*rv,Math.sin(a)*rv):dc.lineTo(Math.cos(a)*rv,Math.sin(a)*rv);
  }
  dc.closePath(); dc.fill();
}

function drawBook(col){
  dc.fillStyle=col;
  dc.beginPath(); dc.roundRect(-18,-22,36,44,4); dc.fill();
  dc.fillStyle='rgba(0,0,0,.15)'; dc.fillRect(-18,-22,6,44);
  dc.fillStyle='#fff'; dc.fillRect(-10,-20,26,40);
  dc.strokeStyle='rgba(0,0,0,.1)'; dc.lineWidth=1.2;
  for(let y=-12;y<=16;y+=6){dc.beginPath();dc.moveTo(-8,y);dc.lineTo(14,y);dc.stroke();}
}

function drawApple(col){
  dc.fillStyle=col;
  dc.beginPath(); dc.ellipse(0,4,16,18,0,0,Math.PI*2); dc.fill();
  dc.fillStyle='#4caf50';
  dc.beginPath(); dc.ellipse(5,-14,7,4,-0.6,0,Math.PI*2); dc.fill();
  dc.strokeStyle='#5d4037'; dc.lineWidth=2;
  dc.beginPath(); dc.moveTo(0,-13); dc.lineTo(2,-18); dc.stroke();
  dc.fillStyle='rgba(255,255,255,.4)';
  dc.beginPath(); dc.ellipse(-5,-4,4,6,-.4,0,Math.PI*2); dc.fill();
}

function drawEraser(col){
  dc.fillStyle=col;
  dc.beginPath(); dc.roundRect(-20,-10,40,20,5); dc.fill();
  dc.fillStyle='rgba(255,255,255,.3)'; dc.fillRect(-20,-10,14,20);
  dc.strokeStyle='rgba(0,0,0,.1)'; dc.lineWidth=1;
  dc.beginPath(); dc.moveTo(-6,-10); dc.lineTo(-6,10); dc.stroke();
}

function drawSparkle(col){
  dc.strokeStyle=col; dc.lineWidth=2.5; dc.lineCap='round';
  [[0,-16,0,16],[-16,0,16,0],[-11,-11,11,11],[-11,11,11,-11]].forEach(([x1,y1,x2,y2])=>{
    dc.beginPath(); dc.moveTo(x1,y1); dc.lineTo(x2,y2); dc.stroke();
  });
  dc.fillStyle=col;
  dc.beginPath(); dc.arc(0,0,3,0,Math.PI*2); dc.fill();
}

resizeDoodle();
window.addEventListener('resize', resizeDoodle);

/* ══ WHEEL ══════════════════════════════════════════ */
const PALETTE=[
  {bg:'#b5d5f5',border:'#5599dd',text:'#1a4a80'},
  {bg:'#ffd6a0',border:'#e08020',text:'#7a3800'},
  {bg:'#c8f0c8',border:'#40a040',text:'#1a5a1a'},
  {bg:'#f5c8e8',border:'#c050a0',text:'#6a0050'},
  {bg:'#ffe5a0',border:'#d0a000',text:'#6a4800'},
  {bg:'#d0c8f8',border:'#7060d0',text:'#2a1080'},
  {bg:'#ffc8c8',border:'#d04040',text:'#700000'},
  {bg:'#c8f0f0',border:'#30a0b0',text:'#005060'},
];

const labels=[
  'النص الأول','النص الثاني','النص الثالث','النص الرابع',
  'النص الخامس','النص السادس','النص السابع','النص الثامن'
];

let spinning=false, currentAngle=0;
const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
const W=canvas.width, CX=W/2, CY=W/2, R=W/2-8;

function drawWheel(angle=0){
  ctx.clearRect(0,0,W,W);
  const n=labels.length, arc=(2*Math.PI)/n;

  // outer decorative rings
  ctx.beginPath(); ctx.arc(CX,CY,R+8,0,Math.PI*2);
  ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,R+4,0,Math.PI*2);
  ctx.strokeStyle='#d4a84b'; ctx.lineWidth=5; ctx.stroke();

  labels.forEach((label,i)=>{
    const start=angle+i*arc-Math.PI/2;
    const end=start+arc;
    const mid=start+arc/2;
    const pal=PALETTE[i%PALETTE.length];

    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,start,end); ctx.closePath();
    ctx.fillStyle=pal.bg; ctx.fill();

    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(start)*R, CY+Math.sin(start)*R);
    ctx.strokeStyle=pal.border+'66'; ctx.lineWidth=2; ctx.stroke();

    // dot on rim
    const dotX=CX+Math.cos(mid)*(R-7), dotY=CY+Math.sin(mid)*(R-7);
    ctx.beginPath(); ctx.arc(dotX,dotY,4,0,Math.PI*2);
    ctx.fillStyle=pal.border; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();

    // text
    const textR=R*.62;
    ctx.save();
    ctx.translate(CX+Math.cos(mid)*textR, CY+Math.sin(mid)*textR);
    ctx.rotate(mid+Math.PI/2);
    const fs=Math.min(16,Math.floor(R*arc*.32));
    ctx.font=`700 ${fs}px Tajawal, sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=pal.text;
    ctx.shadowColor='rgba(255,255,255,.9)'; ctx.shadowBlur=5;
    const maxC=Math.max(5,Math.floor(arc*R/(fs*.55)));
    let lbl=label.length>maxC?label.slice(0,maxC-1)+'…':label;
    ctx.fillText(lbl,0,0);
    ctx.restore();
  });

  // inner border
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='#d4a84b44'; ctx.lineWidth=2; ctx.stroke();

  // center seal
  const cr=R*.22;
  ctx.beginPath(); ctx.arc(CX,CY,cr+5,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#d4a84b'; ctx.lineWidth=3; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX,CY,cr,0,Math.PI*2);
  const cg=ctx.createRadialGradient(CX-cr*.3,CY-cr*.3,0,CX,CY,cr);
  cg.addColorStop(0,'#fffbe8'); cg.addColorStop(1,'#f5e090');
  ctx.fillStyle=cg; ctx.fill();

  ctx.font=`${cr*.9}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#f0c04055'; ctx.shadowBlur=6;
  ctx.fillStyle='#c49a20';
  ctx.fillText('⭐',CX,CY+1);
}

function doSpin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('spin-outer').disabled=true;
  const extra=(6+Math.floor(Math.random()*5))*2*Math.PI;
  const stop=Math.random()*2*Math.PI;
  const total=extra+stop;
  const dur=4500+Math.random()*2000;
  let t0=null;
  const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  function frame(ts){
    if(!t0)t0=ts;
    const p=Math.min((ts-t0)/dur,1);
    drawWheel(currentAngle+total*ease(p));
    if(p<1){requestAnimationFrame(frame);return;}
    currentAngle=(currentAngle+total)%(2*Math.PI);
    spinning=false;
    document.getElementById('spin-btn').disabled=false;
    document.getElementById('spin-outer').disabled=false;
    revealWinner(currentAngle);
  }
  requestAnimationFrame(frame);
}

document.getElementById('spin-btn').addEventListener('click',doSpin);
document.getElementById('spin-outer').addEventListener('click',doSpin);

function revealWinner(angle){
  const n=labels.length, arc=(2*Math.PI)/n;
  const norm=((Math.PI-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%n;
  document.getElementById('winner-text').textContent=labels[idx]||`قسم ${idx+1}`;
  document.getElementById('result-modal').classList.add('show');
  launchConfetti();
}

document.getElementById('btn-close-result').addEventListener('click',()=>{
  document.getElementById('result-modal').classList.remove('show');
  stopConfetti();
});

/* ══ CONFETTI ═══════════════════════════════════════ */
const cc=document.getElementById('confetti');
const cx2=cc.getContext('2d');
let particles=[],confAnim;
const CONF=['#f28b82','#fbbc04','#34a853','#4285f4','#a142f4','#ff6d00','#e91e63','#00bcd4'];

function launchConfetti(){
  cc.width=innerWidth; cc.height=innerHeight;
  particles=Array.from({length:140},()=>({
    x:Math.random()*cc.width, y:-10,
    vx:(Math.random()-.5)*7, vy:Math.random()*5+3,
    size:Math.random()*9+4,
    color:CONF[Math.floor(Math.random()*CONF.length)],
    rot:Math.random()*360, rotV:(Math.random()-.5)*10,
    shape:['rect','circle','star'][Math.floor(Math.random()*3)]
  }));
  confAnim=requestAnimationFrame(animConf);
}
function animConf(){
  cx2.clearRect(0,0,cc.width,cc.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=.13;
    cx2.save(); cx2.translate(p.x,p.y); cx2.rotate(p.rot*Math.PI/180);
    cx2.fillStyle=p.color;
    if(p.shape==='rect') cx2.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    else if(p.shape==='circle'){cx2.beginPath();cx2.arc(0,0,p.size/2,0,Math.PI*2);cx2.fill();}
    else{
      cx2.beginPath();
      for(let j=0;j<5;j++){
        const a=j*Math.PI*2/5-Math.PI/2, a2=a+Math.PI/5;
        j===0?cx2.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size):cx2.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);
        cx2.lineTo(Math.cos(a2)*p.size*.4,Math.sin(a2)*p.size*.4);
      }
      cx2.closePath(); cx2.fill();
    }
    cx2.restore();
  });
  particles=particles.filter(p=>p.y<cc.height+20);
  if(particles.length) confAnim=requestAnimationFrame(animConf);
  else cx2.clearRect(0,0,cc.width,cc.height);
}
function stopConfetti(){
  if(confAnim)cancelAnimationFrame(confAnim);
  cx2.clearRect(0,0,cc.width,cc.height);
}

drawWheel(0);
</script>
</body>
</html>
